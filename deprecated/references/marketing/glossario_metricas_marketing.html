<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossário de Métricas de Marketing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-card:       #ffffff;
    --bg-secondary:  rgba(0, 0, 0, 0.03);
    --text-primary:  #01071d;
    --text-secondary:#54595f;
    --text-tertiary: #777777;
    --border:        rgba(0, 0, 0, 0.08);
    --border-md:     rgba(0, 0, 0, 0.14);
    --accent:        #ee782e;
    --radius-md:     8px;
    --radius-lg:     16px;
    --font:          'Montserrat', sans-serif;
    --font-mono:     'Fira Mono', 'Courier New', monospace;
    --shadow:        0px 0px 10px rgba(0, 0, 0, 0.08);
  }

  body {
    font-family: var(--font);
    background: linear-gradient(135deg, #f7f7f7 0%, #e2e2e2 100%);
    background-attachment: fixed;
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2.5rem 1rem 4rem;
  }

  .container { max-width: 780px; margin: 0 auto; }

  header {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .eyebrow {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  header h1 {
    font-size: clamp(22px, 4vw, 30px);
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  header p { font-size: 14px; color: var(--text-secondary); margin-top: 6px; line-height: 1.6; }

  .search-wrap { position: relative; margin-bottom: 1.25rem; }
  .search-wrap svg {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: var(--text-secondary);
    pointer-events: none;
  }
  .search-wrap input {
    width: 100%;
    padding: 11px 16px 11px 42px;
    font-size: 14px;
    font-family: var(--font);
    border: 1px solid var(--border-md);
    border-radius: var(--radius-lg);
    background: var(--bg-card);
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    box-shadow: var(--shadow);
  }
  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(238, 120, 46, 0.12);
  }
  .search-wrap input::placeholder { color: var(--text-tertiary); }

  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1.25rem; }
  .tag-btn {
    font-size: 12px; font-family: var(--font); font-weight: 500;
    padding: 5px 14px;
    border-radius: 999px;
    border: 1px solid var(--border-md);
    background: var(--bg-card);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tag-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tag-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }

  .count-bar { font-size: 12px; color: var(--text-tertiary); margin-bottom: 1rem; }

  .section { margin-bottom: 1.75rem; }
  .section-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    margin-bottom: 8px;
    box-shadow: var(--shadow);
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  }
  .card:hover {
    border-color: var(--border-md);
    box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.12);
    transform: translateY(-1px);
  }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .metric-name { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .metric-full { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  .badge {
    font-size: 11px; font-weight: 500;
    padding: 3px 10px;
    border-radius: 999px; white-space: nowrap; flex-shrink: 0;
  }
  .badge-blue   { background: #e8edf5; color: #1a3a5c; }
  .badge-teal   { background: #e0f2ee; color: #0a5040; }
  .badge-purple { background: #eeeaf5; color: #3a2a7a; }
  .badge-amber  { background: #fdecd8; color: #8a3800; }
  .badge-coral  { background: #fde8e0; color: #7a2010; }
  .badge-green  { background: #e8f0e0; color: #2a5010; }

  .metric-desc { font-size: 13px; color: var(--text-secondary); margin-top: 8px; line-height: 1.65; }
  .metric-formula {
    margin-top: 8px; padding: 8px 12px;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    font-size: 12px; font-family: var(--font-mono);
    color: var(--text-primary);
    border-left: 3px solid var(--accent);
  }
  .metric-example {
    margin-top: 6px; font-size: 12px;
    color: var(--text-tertiary); font-style: italic;
  }

  .no-results {
    text-align: center; padding: 3rem 1rem;
    color: var(--text-tertiary); font-size: 14px;
  }

  footer {
    margin-top: 3rem; padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text-tertiary);
    text-align: center;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="eyebrow">Guia de Referência</div>
    <h1>Glossário de Métricas<br>de Marketing</h1>
    <p>30 métricas essenciais com fórmulas e exemplos práticos</p>
  </header>

  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="Buscar métrica..." oninput="filterAll()">
  </div>

  <div class="filters" id="filters"></div>
  <div class="count-bar" id="count-bar"></div>
  <div id="content"></div>

  <footer>Glossário de Marketing Digital · Floriano · 2026</footer>
</div>

<script>
const data = [
  {
    name: "CTR", full: "Click-Through Rate", cat: "Engajamento", badge: "badge-blue",
    desc: "Percentual de pessoas que clicaram em um anúncio ou link em relação ao número total de impressões. Indica a atratividade e relevância do criativo.",
    formula: "CTR = (Cliques ÷ Impressões) × 100",
    example: "Ex: 9.462 cliques em 152.431 impressões → CTR de 6,2%"
  },
  {
    name: "CPM", full: "Custo por Mil Impressões", cat: "Custo", badge: "badge-amber",
    desc: "Valor pago por cada 1.000 exibições do anúncio, independente de cliques. Muito usado em campanhas de awareness.",
    formula: "CPM = (Custo ÷ Impressões) × 1.000",
    example: "Ex: R$13.258 em 152.431 impressões → CPM de R$86,98"
  },
  {
    name: "CPC", full: "Custo por Clique", cat: "Custo", badge: "badge-amber",
    desc: "Quanto se paga por cada clique em um anúncio. Métrica fundamental para avaliar eficiência de Google Ads, Meta Ads e PPC.",
    formula: "CPC = Custo Total ÷ Número de Cliques",
    example: "Ex: R$13.258 ÷ 9.462 cliques → CPC de R$1,40"
  },
  {
    name: "CPA", full: "Custo por Aquisição", cat: "Custo", badge: "badge-amber",
    desc: "Quanto custa, em média, cada conversão (compra, cadastro, lead). Métrica-chave para rentabilidade.",
    formula: "CPA = Custo Total ÷ Número de Conversões",
    example: "Ex: R$5.000 ÷ 250 conversões → CPA de R$20"
  },
  {
    name: "CPL", full: "Custo por Lead", cat: "Custo", badge: "badge-amber",
    desc: "Valor investido para captar um lead qualificado. Essencial para campanhas de geração de demanda.",
    formula: "CPL = Investimento Total ÷ Leads Gerados",
    example: "Ex: R$2.000 ÷ 400 leads → CPL de R$5,00"
  },
  {
    name: "ROI", full: "Return on Investment", cat: "Retorno", badge: "badge-teal",
    desc: "Retorno sobre o investimento total. Mostra se a campanha gerou lucro ou prejuízo em relação ao que foi gasto.",
    formula: "ROI = ((Receita − Custo) ÷ Custo) × 100",
    example: "Ex: (R$32.309 − R$13.258) ÷ R$13.258 × 100 → ROI de 143,7%"
  },
  {
    name: "ROAS", full: "Return on Ad Spend", cat: "Retorno", badge: "badge-teal",
    desc: "Quanto de receita foi gerado para cada R$1 gasto em publicidade. Diferente do ROI, não desconta outros custos.",
    formula: "ROAS = Receita Gerada ÷ Gasto com Anúncio",
    example: "Ex: R$32.309 ÷ R$13.258 → ROAS de 2,44x"
  },
  {
    name: "CVR", full: "Conversion Rate", cat: "Engajamento", badge: "badge-blue",
    desc: "Taxa de conversão: percentual de visitantes ou cliques que realizaram a ação desejada (compra, cadastro, etc.).",
    formula: "CVR = (Conversões ÷ Cliques) × 100",
    example: "Ex: 200 compras em 9.462 cliques → CVR de 2,1%"
  },
  {
    name: "Impressões", full: "Impressions", cat: "Alcance", badge: "badge-purple",
    desc: "Número de vezes que um anúncio ou conteúdo foi exibido, independente de ter sido clicado. Mede o alcance bruto.",
    formula: "— (métrica absoluta)",
    example: "Ex: 152.431 impressões em uma campanha de email"
  },
  {
    name: "Alcance", full: "Reach", cat: "Alcance", badge: "badge-purple",
    desc: "Número de usuários únicos que viram o conteúdo. Diferente das impressões, não conta visualizações repetidas do mesmo usuário.",
    formula: "Frequência = Impressões ÷ Alcance",
    example: "Ex: 80.000 pessoas únicas alcançadas"
  },
  {
    name: "LTV", full: "Lifetime Value", cat: "Retenção", badge: "badge-coral",
    desc: "Valor total que um cliente gera ao longo de todo o relacionamento com a empresa. Fundamental para decisões de quanto investir na aquisição.",
    formula: "LTV = Ticket Médio × Frequência de Compra × Tempo de Retenção",
    example: "Ex: R$150 × 4×/ano × 3 anos → LTV de R$1.800"
  },
  {
    name: "CAC", full: "Custo de Aquisição de Cliente", cat: "Custo", badge: "badge-amber",
    desc: "Custo total para adquirir um novo cliente, somando marketing e vendas. Deve ser menor que o LTV para o negócio ser viável.",
    formula: "CAC = (Investimento em Marketing + Vendas) ÷ Novos Clientes",
    example: "Ex: R$10.000 ÷ 50 novos clientes → CAC de R$200"
  },
  {
    name: "Churn Rate", full: "Taxa de Cancelamento", cat: "Retenção", badge: "badge-coral",
    desc: "Percentual de clientes que cancelaram ou deixaram de comprar em um período. Alta taxa indica problema de retenção.",
    formula: "Churn = (Clientes Perdidos ÷ Clientes no Início) × 100",
    example: "Ex: 50 cancelamentos em 1.000 clientes → Churn de 5%"
  },
  {
    name: "NPS", full: "Net Promoter Score", cat: "Retenção", badge: "badge-coral",
    desc: "Índice de satisfação e lealdade do cliente, medido pela probabilidade de recomendar a marca. Varia de −100 a +100.",
    formula: "NPS = % Promotores − % Detratores",
    example: "Ex: 60% promotores − 20% detratores → NPS de 40"
  },
  {
    name: "Bounce Rate", full: "Taxa de Rejeição", cat: "Engajamento", badge: "badge-blue",
    desc: "Percentual de visitantes que saem do site sem interagir com nenhuma outra página. Alta taxa pode indicar baixa relevância do conteúdo.",
    formula: "Bounce Rate = (Sessões de 1 página ÷ Total de Sessões) × 100",
    example: "Ex: 3.000 rejeições em 10.000 sessões → Bounce Rate de 30%"
  },
  {
    name: "Open Rate", full: "Taxa de Abertura", cat: "Email", badge: "badge-purple",
    desc: "Percentual de destinatários que abriram o email. Indica a eficácia do assunto e remetente. Boas taxas variam de 20% a 30%.",
    formula: "Open Rate = (Emails Abertos ÷ Emails Entregues) × 100",
    example: "Ex: 2.500 aberturas em 10.000 enviados → Open Rate de 25%"
  },
  {
    name: "CTR de Email", full: "Click-Through Rate (Email)", cat: "Email", badge: "badge-purple",
    desc: "Percentual de destinatários que clicaram em algum link dentro do email. Mede o engajamento real com o conteúdo.",
    formula: "CTR Email = (Cliques ÷ Emails Entregues) × 100",
    example: "Ex: 500 cliques em 10.000 entregues → CTR de 5%"
  },
  {
    name: "CTOR", full: "Click-to-Open Rate", cat: "Email", badge: "badge-purple",
    desc: "Proporção de pessoas que abriram o email E clicaram em algum link. Avalia a qualidade do conteúdo para quem abriu.",
    formula: "CTOR = (Cliques ÷ Aberturas) × 100",
    example: "Ex: 500 cliques ÷ 2.500 aberturas → CTOR de 20%"
  },
  {
    name: "Faturamento Bruto", full: "Gross Revenue", cat: "Faturamento", badge: "badge-teal",
    desc: "Valor total gerado pelas vendas antes de qualquer dedução (devoluções, impostos, descontos). É a receita total no topo da DRE.",
    formula: "Faturamento Bruto = Preço × Quantidade Vendida",
    example: "Ex: R$150 × 2.000 unidades vendidas → Faturamento de R$300.000"
  },
  {
    name: "Receita Líquida", full: "Net Revenue", cat: "Faturamento", badge: "badge-teal",
    desc: "Receita após descontar devoluções, cancelamentos e impostos sobre vendas. É o valor real que entra no caixa da empresa.",
    formula: "Receita Líquida = Faturamento Bruto − Devoluções − Impostos",
    example: "Ex: R$300.000 − R$15.000 − R$45.000 → Receita Líquida de R$240.000"
  },
  {
    name: "Ticket Médio", full: "Average Order Value (AOV)", cat: "Faturamento", badge: "badge-teal",
    desc: "Valor médio gasto por cliente em cada compra. Aumentar o ticket médio é uma das formas mais eficientes de crescer receita sem aumentar aquisição.",
    formula: "Ticket Médio = Receita Total ÷ Número de Pedidos",
    example: "Ex: R$240.000 ÷ 1.600 pedidos → Ticket Médio de R$150"
  },
  {
    name: "MRR", full: "Monthly Recurring Revenue", cat: "Faturamento", badge: "badge-teal",
    desc: "Receita recorrente mensal previsível, típica de negócios de assinatura. Indica a saúde financeira e a previsibilidade do negócio.",
    formula: "MRR = Número de Assinantes × Valor Médio do Plano",
    example: "Ex: 500 assinantes × R$99/mês → MRR de R$49.500"
  },
  {
    name: "Taxa de Conversão de Vendas", full: "Sales Conversion Rate", cat: "Vendas", badge: "badge-blue",
    desc: "Percentual de oportunidades ou leads que se tornaram clientes pagantes. Mede a eficiência do funil de vendas.",
    formula: "Taxa de Conversão = (Vendas Realizadas ÷ Oportunidades) × 100",
    example: "Ex: 80 vendas em 400 leads qualificados → Taxa de 20%"
  },
  {
    name: "Taxa de Fechamento", full: "Win Rate", cat: "Vendas", badge: "badge-blue",
    desc: "Percentual de propostas enviadas que resultaram em contrato fechado. Avalia a efetividade do time comercial na etapa final do funil.",
    formula: "Win Rate = (Negócios Fechados ÷ Propostas Enviadas) × 100",
    example: "Ex: 25 contratos em 100 propostas → Win Rate de 25%"
  },
  {
    name: "Ciclo de Vendas", full: "Sales Cycle Length", cat: "Vendas", badge: "badge-blue",
    desc: "Tempo médio entre o primeiro contato com o lead e o fechamento da venda. Ciclos longos aumentam o CAC e reduzem a eficiência do time.",
    formula: "Ciclo Médio = Soma dos dias de cada venda ÷ Total de vendas",
    example: "Ex: soma de 1.500 dias em 50 vendas → Ciclo médio de 30 dias"
  },
  {
    name: "Upsell & Cross-sell Rate", full: "Taxa de Upsell e Cross-sell", cat: "Vendas", badge: "badge-blue",
    desc: "Percentual de clientes que compraram um produto adicional ou de maior valor. Aumenta o LTV sem custo de aquisição.",
    formula: "Taxa = (Clientes com Upsell ÷ Total de Clientes) × 100",
    example: "Ex: 200 upgrades em 1.000 clientes → Taxa de 20%"
  },
  {
    name: "Margem Bruta", full: "Gross Margin", cat: "Financeiro", badge: "badge-amber",
    desc: "Percentual da receita que sobra após descontar o custo direto dos produtos vendidos (CMV). Indica a eficiência produtiva.",
    formula: "Margem Bruta = ((Receita − CMV) ÷ Receita) × 100",
    example: "Ex: (R$240.000 − R$96.000) ÷ R$240.000 × 100 → Margem de 60%"
  },
  {
    name: "Margem Líquida", full: "Net Profit Margin", cat: "Financeiro", badge: "badge-amber",
    desc: "Percentual do lucro líquido sobre a receita total, após todos os custos e despesas. É o indicador final de rentabilidade do negócio.",
    formula: "Margem Líquida = (Lucro Líquido ÷ Receita Total) × 100",
    example: "Ex: R$36.000 de lucro em R$240.000 de receita → Margem de 15%"
  },
  {
    name: "EBITDA", full: "Earnings Before Interest, Taxes, Depreciation and Amortization", cat: "Financeiro", badge: "badge-amber",
    desc: "Lucro operacional antes de juros, impostos, depreciação e amortização. Usado para comparar a rentabilidade operacional entre empresas.",
    formula: "EBITDA = Lucro Líquido + Juros + Impostos + Depreciação + Amortização",
    example: "Ex: R$20.000 + R$5.000 + R$8.000 + R$2.000 → EBITDA de R$35.000"
  },
  {
    name: "Ponto de Equilíbrio", full: "Break-even Point", cat: "Financeiro", badge: "badge-amber",
    desc: "Volume mínimo de vendas necessário para cobrir todos os custos fixos e variáveis, sem lucro nem prejuízo.",
    formula: "Break-even = Custos Fixos ÷ (Preço − Custo Variável Unitário)",
    example: "Ex: R$30.000 ÷ (R$150 − R$60) → Break-even de 334 unidades"
  }
];

const cats = ["Todos", ...new Set(data.map(d => d.cat))];
let activecat = "Todos";

function renderFilters() {
  document.getElementById("filters").innerHTML = cats.map(c =>
    `<button class="tag-btn${c === activecat ? " active" : ""}" onclick="setcat('${c}')">${c}</button>`
  ).join("");
}

function setcat(c) { activecat = c; filterAll(); }

function filterAll() {
  const searchVal = document.getElementById("search").value.toLowerCase();
  renderFilters();

  const filtered = data.filter(d => {
    const matchCat = activecat === "Todos" || d.cat === activecat;
    const matchSearch = !searchVal ||
      d.name.toLowerCase().includes(searchVal) ||
      d.full.toLowerCase().includes(searchVal) ||
      d.desc.toLowerCase().includes(searchVal);
    return matchCat && matchSearch;
  });

  document.getElementById("count-bar").textContent =
    `${filtered.length} métrica${filtered.length !== 1 ? "s" : ""} encontrada${filtered.length !== 1 ? "s" : ""}`;

  if (!filtered.length) {
    document.getElementById("content").innerHTML =
      `<div class="no-results">Nenhuma métrica encontrada.</div>`;
    return;
  }

  const grouped = {};
  filtered.forEach(d => { (grouped[d.cat] = grouped[d.cat] || []).push(d); });

  let html = "";
  for (const [cat, items] of Object.entries(grouped)) {
    html += `<div class="section"><div class="section-title">${cat}</div>`;
    items.forEach(d => {
      html += `
        <div class="card">
          <div class="card-header">
            <div>
              <div class="metric-name">${d.name}</div>
              <div class="metric-full">${d.full}</div>
            </div>
            <span class="badge ${d.badge}">${d.cat}</span>
          </div>
          <div class="metric-desc">${d.desc}</div>
          <div class="metric-formula">${d.formula}</div>
          <div class="metric-example">${d.example}</div>
        </div>`;
    });
    html += "</div>";
  }
  document.getElementById("content").innerHTML = html;
}

renderFilters();
filterAll();
</script>
</body>
</html>
