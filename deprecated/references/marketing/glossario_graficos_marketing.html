<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia de Visualizações · Marketing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-card:   #ffffff;
  --bg2:       rgba(0, 0, 0, 0.03);
  --bg3:       rgba(0, 0, 0, 0.06);
  --ink:       #01071d;
  --ink2:      #54595f;
  --ink3:      #777777;
  --accent:    #ee782e;
  --line:      rgba(0, 0, 0, 0.08);
  --line-md:   rgba(0, 0, 0, 0.14);
  --r:         10px;
  --r-lg:      16px;
  --font:      'Montserrat', sans-serif;
  --mono:      'Fira Mono', 'Courier New', monospace;
  --shadow:    0px 0px 10px rgba(0, 0, 0, 0.08);
}

body {
  font-family: var(--font);
  background: linear-gradient(135deg, #f7f7f7 0%, #e2e2e2 100%);
  background-attachment: fixed;
  color: var(--ink);
  min-height: 100vh;
  padding: 2.5rem 1rem 4rem;
}

.container { max-width: 820px; margin: 0 auto; }

/* ── HEADER ── */
header {
  margin-bottom: 2.5rem;
  padding-bottom: 2rem;
  border-bottom: 1px solid var(--line-md);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
}
header h1 {
  font-family: var(--font);
  font-size: clamp(24px, 5vw, 36px);
  font-weight: 700;
  line-height: 1.2;
  letter-spacing: -0.02em;
  color: var(--ink);
}
header h1 em {
  font-style: normal;
  color: var(--accent);
}
header p {
  font-size: 14px;
  color: var(--ink2);
  max-width: 560px;
  line-height: 1.6;
  margin-top: 4px;
}
.legend-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 12px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--ink2);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
}

/* ── CONTROLS ── */
.controls { margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 10px; }
.search-wrap { position: relative; }
.search-wrap svg {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%);
  width: 15px; height: 15px;
  color: var(--ink3);
  pointer-events: none;
}
.search-wrap input {
  width: 100%;
  padding: 11px 16px 11px 42px;
  font-size: 14px;
  font-family: var(--font);
  border: 1px solid var(--line-md);
  border-radius: var(--r-lg);
  background: var(--bg-card);
  color: var(--ink);
  outline: none;
  box-shadow: var(--shadow);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-wrap input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(238, 120, 46, 0.12);
}
.search-wrap input::placeholder { color: var(--ink3); }

.filters { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-btn {
  font-size: 12px; font-family: var(--font); font-weight: 500;
  padding: 5px 14px;
  border-radius: 999px;
  border: 1px solid var(--line-md);
  background: var(--bg-card);
  color: var(--ink2);
  cursor: pointer;
  transition: all 0.15s;
}
.tag-btn:hover { border-color: var(--accent); color: var(--accent); }
.tag-btn.active { border-color: var(--accent); background: var(--accent); color: #fff; }

.count-bar { font-size: 12px; color: var(--ink3); }

/* ── SECTION ── */
.section { margin-bottom: 2rem; }
.section-title {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--line);
}

/* ── CHART PREVIEW ── */
.chart-preview {
  width: 100%;
  height: 110px;
  border-radius: var(--r-lg) var(--r-lg) 0 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
.chart-preview svg {
  width: 100%;
  height: 100%;
}

/* ── CARD ── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 0;
  margin-bottom: 10px;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
}
.card:hover {
  border-color: var(--line-md);
  box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.12);
  transform: translateY(-1px);
}

.card-top {
  padding: 1rem 1.25rem 0.9rem;
}
.card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.chart-name { font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: -0.01em; }
.chart-also { font-size: 12px; color: var(--ink3); margin-top: 2px; }

.badge {
  font-size: 11px; font-weight: 500;
  padding: 3px 10px;
  border-radius: 999px; white-space: nowrap; flex-shrink: 0;
}
.badge-temporal   { background: #e8edf5; color: #1a3a6a; }
.badge-comparar   { background: #fdecd8; color: #8a3800; }
.badge-parte-todo { background: #e8f0e0; color: #2a5010; }
.badge-relacao    { background: #fef3e2; color: #7a5000; }
.badge-fluxo      { background: #eeeaf5; color: #3a2a7a; }
.badge-geo        { background: #e0f2f0; color: #0a4a48; }
.badge-distribuicao { background: #fde8e0; color: #7a2010; }

.chart-desc { font-size: 13px; color: var(--ink2); margin-top: 8px; line-height: 1.65; }

.when-use {
  margin-top: 10px;
  padding: 9px 12px;
  background: var(--bg2);
  border-radius: var(--r);
  border-left: 3px solid var(--accent);
  font-size: 12px;
  color: var(--ink2);
  line-height: 1.6;
}
.when-use strong { color: var(--ink); font-weight: 600; }

/* ── ACCORDION RECOMENDAÇÕES ── */
.recs-toggle {
  width: 100%;
  padding: 10px 1.25rem;
  background: var(--bg2);
  border: none;
  border-top: 1px solid var(--line);
  text-align: left;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 700;
  color: var(--ink2);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  transition: background 0.15s;
}
.recs-toggle:hover { background: var(--bg3); }
.recs-toggle .arrow {
  width: 16px; height: 16px; transition: transform 0.2s;
  color: var(--ink3);
}
.recs-toggle.open .arrow { transform: rotate(180deg); }
.recs-toggle .pill-count {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 10px; font-weight: 700;
  margin-left: 6px;
}

.recs-body {
  display: none;
  padding: 14px 1.25rem 1.25rem;
  border-top: 1px solid var(--line);
  background: var(--bg-card);
}
.recs-body.open { display: block; }

.rec-item {
  padding: 10px 12px;
  border-radius: var(--r);
  border: 1px solid var(--line);
  margin-bottom: 8px;
  transition: border-color 0.15s;
}
.rec-item:last-child { margin-bottom: 0; }
.rec-item:hover { border-color: var(--line-md); }
.rec-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.rec-metric { font-size: 13px; font-weight: 600; color: var(--ink); }
.rec-cat {
  font-size: 10px; font-weight: 500;
  padding: 2px 8px; border-radius: 999px; flex-shrink: 0;
}
.rec-tip { font-size: 12px; color: var(--ink2); line-height: 1.6; }
.rec-code {
  margin-top: 6px; padding: 6px 10px;
  background: var(--bg2);
  border-radius: 6px;
  font-size: 11px; font-family: var(--mono);
  color: var(--ink);
  border-left: 3px solid var(--accent);
}

/* ── NO RESULTS ── */
.no-results {
  text-align: center; padding: 3rem 1rem;
  color: var(--ink3); font-size: 14px;
}

/* ── FOOTER ── */
footer {
  margin-top: 3rem; padding-top: 1.5rem;
  border-top: 1px solid var(--line);
  font-size: 12px; color: var(--ink3);
  text-align: center;
}
</style>
</head>

</div>

      { metric: "CAC", metCat: "Custo", tip: "Bubble map por cidade: tamanho da bolha = CAC. Imediatamente visível quais praças são caras para adquirir clientes.", code: "mapa BR cidades · bubble size = CAC médio" },
      { metric: "Ticket Médio", metCat: "Faturamento", tip: "Choropleth de ticket médio por região. Ajuda a calibrar preços e promoções por geografia.", code: "mapa BR estados · cor = ticket médio R$" }
    ]
  }
];

const cats = ["Todos", ...new Set(data.map(d => d.cat))];
let activecat = "Todos";

function renderFilters() {
  document.getElementById("filters").innerHTML = cats.map(c =>
    `<button class="tag-btn${c === activecat ? " active" : ""}" onclick="setcat('${c}')">${c}</button>`
  ).join("");
}

function setcat(c) { activecat = c; filterAll(); }

function filterAll() {
  const q = document.getElementById("search").value.toLowerCase();
  renderFilters();

  const filtered = data.filter(d => {
    const matchCat = activecat === "Todos" || d.cat === activecat;
    const matchQ = !q ||
      d.name.toLowerCase().includes(q) ||
      d.also.toLowerCase().includes(q) ||
      d.desc.toLowerCase().includes(q) ||
      d.recs.some(r => r.metric.toLowerCase().includes(q) || r.tip.toLowerCase().includes(q));
    return matchCat && matchQ;
  });

  document.getElementById("count-bar").textContent =
    `${filtered.length} tipo${filtered.length !== 1 ? "s" : ""} de gráfico encontrado${filtered.length !== 1 ? "s" : ""}`;

  if (!filtered.length) {
    document.getElementById("content").innerHTML = `<div class="no-results">Nenhum resultado encontrado.</div>`;
    return;
  }

  const grouped = {};
  filtered.forEach(d => { (grouped[d.cat] = grouped[d.cat] || []).push(d); });

  let html = "";
  for (const [cat, items] of Object.entries(grouped)) {
    html += `<div class="section"><div class="section-title">${cat}</div>`;
    items.forEach((d, i) => {
      const id = `card-${d.name.replace(/\s+/g,'-')}`;
      html += `
        <div class="card" id="${id}">
          <div class="chart-preview" style="background:${(chartPreviews[d.name]||{}).bg||'#F0F0F0'}">${(chartPreviews[d.name]||{}).svg||''}</div>
          <div class="card-top">
            <div class="card-header">
              <div>
                <div class="chart-name">${d.name}</div>
                <div class="chart-also">${d.also}</div>
              </div>
              <span class="badge ${d.badge}">${d.cat}</span>
            </div>
            <div class="chart-desc">${d.desc}</div>
            <div class="when-use">${d.when}</div>
          </div>
          <button class="recs-toggle" onclick="toggleRecs(this)">
            <span>📊 Métricas recomendadas <span class="pill-count">${d.recs.length}</span></span>
            <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <div class="recs-body">
            ${d.recs.map(r => `
              <div class="rec-item">
                <div class="rec-top">
                  <span class="rec-metric">${r.metric}</span>
                  <span class="rec-cat" style="background:${d.catBg};color:${d.catColor}">${r.metCat}</span>
                </div>
                <div class="rec-tip">${r.tip}</div>
                <div class="rec-code">${r.code}</div>
              </div>
            `).join("")}
          </div>
        </div>`;
    });
    html += "</div>";
  }
  document.getElementById("content").innerHTML = html;
}

function toggleRecs(btn) {
  btn.classList.toggle("open");
  const body = btn.nextElementSibling;
  body.classList.toggle("open");
}

renderFilters();
filterAll();
</script>
</body>
</html>
