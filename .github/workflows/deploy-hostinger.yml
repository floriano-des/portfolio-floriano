name: Deploy para Hostinger (Produção)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Pegar o código fonte
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependências e Gerar Site
        run: |
          npm install
          npm run build

      - name: Publicar arquivos na branch deploy
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

          # Salva os arquivos gerados fora do repo
          cp -r _site /tmp/site-build

          # Faz checkout da branch deploy (ou cria como orphan se não existir)
          git fetch origin deploy 2>/dev/null || true
          git checkout deploy 2>/dev/null || git checkout --orphan deploy

          # Remove tudo e copia os arquivos novos
          git rm -rf . --quiet 2>/dev/null || true
          cp -r /tmp/site-build/. .

          # Commit e push normal — sem --force
          git add -A
          git commit -m "deploy: ${{ github.sha }}" || echo "Nada para commitar"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git deploy
